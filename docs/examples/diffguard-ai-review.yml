name: DiffGuard-AI Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  diffguard-ai:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - name: Run DiffGuard-AI
        uses: diffguard-ai/diffguard-ai@v0.1.0
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
