services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: diffguard
      POSTGRES_USER: diffguard
      POSTGRES_PASSWORD: diffguard
    ports:
      - "5432:5432"
    volumes:
      - diffguard_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U diffguard -d diffguard"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - diffguard_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  diffguard_postgres:
  diffguard_redis:
